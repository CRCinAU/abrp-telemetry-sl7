name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write API key to local.properties
        run: echo "abrp.api_key=${{ secrets.ABRP_API_KEY }}" >> local.properties

      - name: Build APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./gradlew assembleDebug -PversionName=$VERSION -PversionCode=${{ github.run_number }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/abrp-telemetry-sl7-${VERSION}-debug.apk

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/abrp-telemetry-sl7-*-debug.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
