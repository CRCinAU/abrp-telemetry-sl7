name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore debug keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "::error::DEBUG_KEYSTORE secret is missing or empty"
            exit 1
          fi
          # AGP on GitHub's ubuntu runners reads the debug keystore from
          # $XDG_CONFIG_HOME/.android/debug.keystore — NOT the legacy
          # ~/.android/debug.keystore. Confirmed via `./gradlew :app:signingReport`
          # which prints `Store: /home/runner/.config/.android/debug.keystore`.
          # Write to both paths so we work whether or not XDG_CONFIG_HOME is set.
          KS_LEGACY="$HOME/.android/debug.keystore"
          KS_XDG="${XDG_CONFIG_HOME:-$HOME/.config}/.android/debug.keystore"
          mkdir -p "$(dirname "$KS_LEGACY")" "$(dirname "$KS_XDG")"
          # printf %s avoids the extra newline that `echo "$x"` would add.
          printf '%s' "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > "$KS_LEGACY"
          if [ ! -s "$KS_LEGACY" ]; then
            echo "::error::Decoded keystore is empty — DEBUG_KEYSTORE is not valid base64"
            exit 1
          fi
          cp "$KS_LEGACY" "$KS_XDG"
          # Smoke-test the path AGP actually reads. If your keystore uses
          # different creds, AGP can't sign with it either — regenerate with:
          #   keytool -genkey -keystore debug.keystore -storepass android \
          #     -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 \
          #     -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          keytool -list -keystore "$KS_XDG" -storepass android \
            -alias androiddebugkey > /dev/null
          echo "Keystore restored to:"
          echo "  $KS_LEGACY ($(stat -c%s "$KS_LEGACY") bytes)"
          echo "  $KS_XDG ($(stat -c%s "$KS_XDG") bytes)"
          keytool -list -v -keystore "$KS_XDG" -storepass android \
            -alias androiddebugkey | grep -E '^(Owner|SHA256):'

      - name: Write API key to local.properties
        run: echo "abrp.api_key=${{ secrets.ABRP_API_KEY }}" >> local.properties

      - name: Build APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./gradlew assembleDebug -PversionName=$VERSION
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/abrp-telemetry-sl7-${VERSION}-debug.apk

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/abrp-telemetry-sl7-*-debug.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
