name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the monotonicity check below can read the
          # previous v-tag's commit timestamp. Default checkout is shallow
          # (depth=1) and would leave `git log "$PREV^{commit}"` failing with
          # "unknown revision".
          fetch-depth: 0

      - name: Verify versionCode monotonicity
        run: |
          set -euo pipefail
          # gitCommitTime() in app/build.gradle derives versionCode from the
          # current commit's unix timestamp. If a tag is pushed against a
          # commit older than the previous release's commit (cherry-pick
          # hotfix, rebase with --committer-date-is-author-date, etc.) the
          # resulting versionCode regresses and pm install -r rejects the
          # APK as a downgrade — permanently wedging existing installs on
          # the old version. Catch that here instead of after release.
          CUR="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-creatordate --list 'v*' \
            | grep -v "^${CUR}$" | head -1 || true)
          if [ -z "$PREV" ]; then
            echo "First v-tag (no predecessor); skipping monotonicity check."
            exit 0
          fi
          CUR_TS=$(git log -1 --format=%ct "${CUR}^{commit}")
          PREV_TS=$(git log -1 --format=%ct "${PREV}^{commit}")
          echo "Current  ${CUR}: versionCode=${CUR_TS}"
          echo "Previous ${PREV}: versionCode=${PREV_TS}"
          if [ "$CUR_TS" -le "$PREV_TS" ]; then
            echo "::error::versionCode would regress: ${CUR}(${CUR_TS}) <= ${PREV}(${PREV_TS})"
            echo "::error::pm install -r will reject this APK as a downgrade. Re-tag from a newer commit."
            exit 1
          fi
          # Clock-skewed commits dated in the future would bake a versionCode
          # that no sane future release can exceed — refuse them too.
          NOW=$(date +%s)
          if [ "$CUR_TS" -gt "$NOW" ]; then
            echo "::error::Commit timestamp ${CUR_TS} is in the future (now=${NOW})."
            echo "::error::Refusing to ship a versionCode that future releases can't exceed."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore debug keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "::error::DEBUG_KEYSTORE secret is missing or empty"
            exit 1
          fi
          # AGP on GitHub's ubuntu runners reads the debug keystore from
          # $XDG_CONFIG_HOME/.android/debug.keystore — NOT the legacy
          # ~/.android/debug.keystore. Confirmed via `./gradlew :app:signingReport`
          # which prints `Store: /home/runner/.config/.android/debug.keystore`.
          # Write to both paths so we work whether or not XDG_CONFIG_HOME is set.
          KS_LEGACY="$HOME/.android/debug.keystore"
          KS_XDG="${XDG_CONFIG_HOME:-$HOME/.config}/.android/debug.keystore"
          mkdir -p "$(dirname "$KS_LEGACY")" "$(dirname "$KS_XDG")"
          # printf %s avoids the extra newline that `echo "$x"` would add.
          printf '%s' "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > "$KS_LEGACY"
          if [ ! -s "$KS_LEGACY" ]; then
            echo "::error::Decoded keystore is empty — DEBUG_KEYSTORE is not valid base64"
            exit 1
          fi
          cp "$KS_LEGACY" "$KS_XDG"
          # Smoke-test the path AGP actually reads. If your keystore uses
          # different creds, AGP can't sign with it either — regenerate with:
          #   keytool -genkey -keystore debug.keystore -storepass android \
          #     -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 \
          #     -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          keytool -list -keystore "$KS_XDG" -storepass android \
            -alias androiddebugkey > /dev/null
          echo "Keystore restored to:"
          echo "  $KS_LEGACY ($(stat -c%s "$KS_LEGACY") bytes)"
          echo "  $KS_XDG ($(stat -c%s "$KS_XDG") bytes)"
          keytool -list -v -keystore "$KS_XDG" -storepass android \
            -alias androiddebugkey | grep -E '^(Owner|SHA256):'

      - name: Write API key to local.properties
        run: echo "abrp.api_key=${{ secrets.ABRP_API_KEY }}" >> local.properties

      - name: Build APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./gradlew assembleDebug -PversionName=$VERSION
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/abrp-telemetry-sl7-${VERSION}-debug.apk

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/abrp-telemetry-sl7-*-debug.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
