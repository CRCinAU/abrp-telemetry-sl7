name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore debug keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.DEBUG_KEYSTORE }}" ]; then
            echo "::error::DEBUG_KEYSTORE secret is missing or empty"
            exit 1
          fi
          mkdir -p ~/.android
          # printf %s avoids the extra newline that `echo "$x"` would add.
          printf '%s' "${{ secrets.DEBUG_KEYSTORE }}" | base64 -d > ~/.android/debug.keystore
          if [ ! -s ~/.android/debug.keystore ]; then
            echo "::error::Decoded keystore is empty — DEBUG_KEYSTORE is not valid base64"
            exit 1
          fi
          # Smoke-test with AGP's expected default debug creds. If your keystore
          # uses different creds, AGP can't sign with it either — regenerate with:
          #   keytool -genkey -keystore debug.keystore -storepass android \
          #     -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 \
          #     -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          keytool -list -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey > /dev/null
          echo "Keystore restored ($(stat -c%s ~/.android/debug.keystore) bytes):"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android \
            -alias androiddebugkey | grep -E '^(Owner|SHA256):'

      - name: Write API key to local.properties
        run: echo "abrp.api_key=${{ secrets.ABRP_API_KEY }}" >> local.properties

      - name: Build APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./gradlew assembleDebug -PversionName=$VERSION -PversionCode=${{ github.run_number }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/abrp-telemetry-sl7-${VERSION}-debug.apk

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/abrp-telemetry-sl7-*-debug.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
